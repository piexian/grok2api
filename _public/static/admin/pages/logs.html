<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="logs.pageTitle">Grok2API - 日志查看</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/css/common.css?v=1.6.0" rel="stylesheet">
  <link href="/static/admin/css/logs.css?v=1.6.0" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="app-header"></div>

  <main class="space-y-6 flex-1 container mx-auto max-w-6xl px-6 py-8 fade-in">
    <div class="space-y-6">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight" data-i18n="logs.title">日志查看</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm" data-i18n="logs.subtitle">按文件、级别和关键词快速筛选，并以更易读的方式查看结构化日志。</p>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
          <button id="refresh-btn" type="button" class="geist-button-outline gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 2v6h-6"></path>
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
              <path d="M3 22v-6h6"></path>
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            </svg>
            <span data-i18n="common.refresh">刷新</span>
          </button>
          <button id="auto-refresh-btn" type="button" class="geist-button-outline auto-refresh-btn" aria-label="自动刷新" data-i18n-aria-label="logs.autoRefresh.buttonAria">
            <span data-i18n="logs.autoRefresh.off">自动刷新：关</span>
          </button>
        </div>
      </div>

      <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="log-stat-card">
          <div class="log-stat-label" data-i18n="logs.stats.file">当前文件</div>
          <div id="stat-file" class="log-stat-value text-lg">-</div>
          <div id="stat-updated" class="log-stat-hint">-</div>
        </div>
        <div class="log-stat-card">
          <div class="log-stat-label" data-i18n="logs.stats.entries">已加载条目</div>
          <div id="stat-matched" class="log-stat-value">0</div>
          <div class="log-stat-hint" data-i18n="logs.stats.entriesHint">按当前筛选展示</div>
        </div>
        <div class="log-stat-card">
          <div class="log-stat-label" data-i18n="logs.stats.errorWarn">告警 / 错误</div>
          <div id="stat-risk" class="log-stat-value">0</div>
          <div class="log-stat-hint" data-i18n="logs.stats.errorWarnHint">warning + error</div>
        </div>
        <div class="log-stat-card">
          <div class="log-stat-label" data-i18n="logs.stats.size">文件大小</div>
          <div id="stat-size" class="log-stat-value">0 B</div>
          <div class="log-stat-hint" data-i18n="logs.stats.sizeHint">磁盘占用</div>
        </div>
      </section>

      <section class="panel-card space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-6 gap-3">
          <div class="md:col-span-1">
            <label class="filter-label" for="log-level" data-i18n="logs.filters.level">级别</label>
            <select id="log-level" class="geist-input">
              <option value="" data-i18n="logs.levels.all">全部级别</option>
              <option value="debug">DEBUG</option>
              <option value="info">INFO</option>
              <option value="warning">WARNING</option>
              <option value="error">ERROR</option>
            </select>
          </div>
          <div class="md:col-span-1">
            <label class="filter-label" for="log-limit" data-i18n="logs.filters.limit">条数</label>
            <select id="log-limit" class="geist-input">
              <option value="100">100</option>
              <option value="200" selected>200</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
          </div>
          <div class="md:col-span-4">
            <label class="filter-label" for="log-keyword" data-i18n="logs.filters.keyword">关键词</label>
            <input id="log-keyword" type="text" class="geist-input" data-i18n-placeholder="logs.filters.keywordPlaceholder" placeholder="traceID / path / 错误关键词">
          </div>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <label class="inline-flex items-center gap-2 text-xs text-[var(--accents-5)]">
            <input id="exclude-admin-routes" type="checkbox" class="checkbox" checked>
            <span data-i18n="logs.filters.excludeAdminRoutes">仅在此页过滤 `/v1/admin/*`</span>
          </label>
          <button id="apply-btn" type="button" class="geist-button" data-i18n="logs.filters.apply">应用筛选</button>
          <button id="reset-btn" type="button" class="geist-button-outline" data-i18n="logs.filters.reset">重置</button>
          <button id="clear-level-btn" type="button" class="geist-button-outline hidden">清除级别过滤</button>
          <div id="level-breakdown" class="flex flex-wrap gap-2"></div>
        </div>
      </section>

      <section class="grid grid-cols-1 xl:grid-cols-[320px_minmax(0,1fr)] gap-4 items-start">
        <aside class="panel-card h-full file-panel">
          <div class="panel-title-row file-panel-header">
            <div>
              <h3 class="panel-title" data-i18n="logs.filesTitle">日志文件</h3>
              <div id="file-count-summary" class="panel-subtle" data-i18n="logs.fileCount" data-i18n-vars="{&quot;count&quot;:0}">0 个日志文件</div>
            </div>
            <button id="file-panel-toggle" type="button" class="file-panel-toggle" aria-expanded="false">
              <span id="file-panel-toggle-text" data-i18n="logs.toggle.expand">展开</span>
              <svg class="file-panel-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
          </div>
          <div id="file-panel-body" class="file-panel-body">
            <div class="file-toolbar">
              <label class="inline-flex items-center gap-2 text-xs text-[var(--accents-5)]">
                <input id="select-all-files" type="checkbox" class="checkbox">
                <span data-i18n="common.selectAll">全选</span>
              </label>
              <button id="delete-selected-btn" type="button" class="geist-button-danger text-xs px-3 h-8" data-i18n="logs.deleteSelected">清理所选</button>
            </div>
            <div id="log-file-list" class="log-file-list"></div>
          </div>
        </aside>

        <section class="space-y-4">
          <div id="loading-state" class="panel-card text-center py-12 text-[var(--accents-4)] hidden" data-i18n="common.loading">加载中...</div>
          <div id="empty-state" class="panel-card text-center py-12 text-[var(--accents-4)] hidden" data-i18n="logs.empty">没有匹配的日志记录</div>
          <div id="log-list" class="space-y-3 log-list-scroll"></div>
        </section>
      </section>
    </div>
  </main>

  <div id="app-footer"></div>

  <div id="log-modal" class="modal-overlay hidden">
    <div class="modal-content modal-xl" id="log-modal-content">
      <div class="modal-header">
        <div>
          <h3 class="modal-title" data-i18n="logs.rawTitle">原始日志</h3>
          <p id="log-modal-meta" class="text-xs text-[var(--accents-4)] mt-1"></p>
        </div>
        <button id="close-modal-btn" type="button" class="modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <pre id="log-modal-body" class="log-modal-body"></pre>
    </div>
  </div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.0"></script>
  <script src="/static/common/js/header.js?v=1.6.0"></script>
  <script src="/static/common/js/footer.js?v=1.6.0"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/admin/js/logs.js?v=1.6.0"></script>
</body>

</html>
